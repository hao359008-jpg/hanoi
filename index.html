<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1a1a2e">
    <title>жұүиҜәеЎ”жёёжҲ?/title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px;
            -webkit-font-smoothing: antialiased;
        }

        .game-container {
            background: rgba(30, 30, 50, 0.98);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            max-width: 1100px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #667eea;
            margin-bottom: 20px;
            font-size: 1.8em;
        }

        .stats-panel {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            padding: 15px;
            background: linear-gradient(135deg, #252540 0%, #1e1e35 100%);
            border-radius: 15px;
            border: 1px solid rgba(102, 126, 234, 0.2);
        }

        .stat-box {
            text-align: center;
        }

        .stat-label {
            font-size: 0.85em;
            color: #888;
            margin-bottom: 5px;
        }

        .stat-number {
            font-size: 1.5em;
            color: #667eea;
            font-weight: bold;
        }

        .control-panel {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        select {
            padding: 12px 16px;
            font-size: 1em;
            border: 3px solid #667eea;
            border-radius: 12px;
            background: #252540;
            color: #667eea;
            cursor: pointer;
            outline: none;
            transition: all 0.3s;
            min-width: 120px;
        }

        select:hover {
            background: #667eea;
            color: #1e1e35;
        }

        button {
            padding: 12px 20px;
            font-size: 1em;
            font-weight: bold;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            min-width: 100px;
        }

        .btn-reset {
            background: linear-gradient(135deg, #4ECDC4 0%, #3dbdb5 100%);
            color: #1e1e35;
        }

        .btn-reset:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(78, 205, 196, 0.4);
        }

        .btn-auto {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-auto:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-undo {
            background: #252540;
            color: #667eea;
            border: 3px solid #667eea;
        }

        .btn-undo:hover:not(:disabled) {
            background: #667eea;
            color: #1e1e35;
            transform: translateY(-2px);
        }

        .btn-undo:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .game-area {
            margin-top: 20px;
        }

        .instruction-box {
            text-align: center;
            padding: 15px;
            background: rgba(102, 126, 234, 0.1);
            border-radius: 10px;
            color: #a0a0c0;
            font-size: 0.95em;
            margin-bottom: 20px;
        }

        .game-board {
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .tower-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 30%;
            min-width: 80px;
        }

        .tower-label {
            color: #a0a0c0;
            font-weight: bold;
            margin-bottom: 10px;
            font-size: 1em;
        }

        .disk-stack {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            height: 280px;
            min-height: 280px;
            width: 100%;
            background: rgba(102, 126, 234, 0.05);
            border-radius: 10px;
            padding-bottom: 10px;
            border: 2px dashed rgba(102, 126, 234, 0.2);
            transition: all 0.3s;
            touch-action: none;
        }

        .disk-stack.drag-over {
            background: rgba(102, 126, 234, 0.2);
            border-color: #667eea;
            transform: scale(1.02);
        }

        .pole {
            position: absolute;
            bottom: 0;
            width: 8px;
            height: 270px;
            background: linear-gradient(180deg, #667eea 0%, #4a5568 100%);
            border-radius: 4px;
            z-index: 1;
        }

        .disk-container {
            position: relative;
            display: flex;
            flex-direction: column-reverse;
            align-items: center;
            width: 100%;
            z-index: 2;
        }

        .disk {
            margin: 3px 0;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
            color: white;
            cursor: grab;
            transition: all 0.2s;
            user-select: none;
            position: relative;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.3);
        }

        .disk::before {
            content: '';
            position: absolute;
            top: 0;
            left: 10%;
            right: 10%;
            height: 40%;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 8px 8px 0 0;
        }

        .disk:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.4);
        }

        .disk.dragging {
            cursor: grabbing;
            transform: scale(1.1);
            z-index: 1000;
        }

        .disk.not-top {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .disk.not-top:hover {
            transform: none;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.3);
        }

        .rules-section {
            margin-top: 30px;
            padding: 20px;
            background: linear-gradient(135deg, #252540 0%, #1e1e35 100%);
            border-radius: 15px;
            border: 1px solid rgba(102, 126, 234, 0.2);
        }

        .rules-section h3 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 1.2em;
        }

        .rules-section ul {
            list-style: none;
            color: #a0a0c0;
        }

        .rules-section li {
            margin-bottom: 10px;
            padding-left: 20px;
            position: relative;
        }

        .rules-section li::before {
            content: 'вң?;
            position: absolute;
            left: 0;
            color: #4ECDC4;
        }

        .rules-section .note {
            margin-top: 15px;
            color: #888;
            font-size: 0.85em;
        }

        .message-box {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 15px 25px;
            border-radius: 10px;
            font-weight: bold;
            z-index: 2000;
            opacity: 0;
            transition: all 0.3s;
            max-width: 90%;
            text-align: center;
        }

        .message-box.show {
            opacity: 1;
        }

        .message-box.success {
            background: rgba(78, 205, 196, 0.9);
            color: #1a1a2e;
        }

        .message-box.error {
            background: rgba(255, 107, 107, 0.9);
            color: white;
        }

        .message-box.info {
            background: rgba(102, 126, 234, 0.9);
            color: white;
        }

        /* еј№еҮәејҸе®ҢжҲҗз•Ңйқўж ·еј?*/
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .modal-overlay.show {
            opacity: 1;
            visibility: visible;
        }

        .modal-container {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            border-radius: 20px;
            padding: 30px;
            max-width: 90%;
            width: 400px;
            text-align: center;
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.5);
            transform: scale(0.8) translateY(20px);
            transition: all 0.3s ease;
            border: 3px solid rgba(102, 126, 234, 0.3);
        }

        .modal-icon {
            font-size: 4em;
            margin-bottom: 15px;
            animation: bounce 1s ease infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .modal-title {
            font-size: 1.8em;
            color: #667eea;
            margin-bottom: 10px;
        }

        .modal-subtitle {
            font-size: 1.1em;
            color: #a0a0c0;
            margin-bottom: 20px;
        }

        .modal-stats {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin-bottom: 25px;
        }

        .modal-stat {
            text-align: center;
        }

        .modal-stat-value {
            font-size: 2em;
            font-weight: bold;
            color: #667eea;
        }

        .modal-stat-label {
            font-size: 0.85em;
            color: #888;
            margin-top: 5px;
        }

        .modal-badge {
            display: inline-block;
            padding: 8px 20px;
            border-radius: 25px;
            font-weight: bold;
            font-size: 1em;
            margin-bottom: 25px;
        }

        .modal-badge.optimal {
            background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%);
            color: #1a1a2e;
        }

        .modal-badge.not-optimal {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .modal-btn {
            padding: 12px 30px;
            font-size: 1em;
            font-weight: bold;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            margin: 0 8px;
            min-width: 100px;
        }

        .modal-btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .modal-btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .modal-btn-secondary {
            background: rgba(102, 126, 234, 0.2);
            color: #667eea;
            border: 2px solid #667eea;
        }

        .modal-btn-secondary:hover {
            background: #667eea;
            color: #1a1a2e;
        }

        /* е№іжқҝз«ҜдјҳеҢ?*/
        @media (max-width: 768px) {
            h1 {
                font-size: 1.6em;
            }

            .stats-panel {
                flex-direction: column;
                gap: 12px;
            }

            .stat-number {
                font-size: 1.4em;
            }

            .game-board {
                flex-direction: column;
                align-items: center;
                gap: 20px;
            }

            .tower-wrapper {
                width: 100%;
                max-width: 300px;
            }

            .disk-stack {
                height: 200px;
                min-height: 200px;
            }

            .pole {
                height: 190px;
            }

            .disk {
                height: 30px;
                font-size: 0.85em;
            }
        }

        /* жүӢжңәз«ҜдјҳеҢ?*/
        @media (max-width: 480px) {
            body {
                padding: 5px;
            }

            .game-container {
                padding: 15px;
                border-radius: 15px;
            }

            h1 {
                font-size: 1.4em;
                margin-bottom: 15px;
            }

            .stats-panel {
                padding: 12px;
                gap: 10px;
            }

            .stat-label {
                font-size: 0.8em;
            }

            .stat-number {
                font-size: 1.3em;
            }

            .control-panel {
                gap: 8px;
            }

            select {
                padding: 10px 14px;
                font-size: 0.9em;
                min-width: 100px;
            }

            button {
                padding: 10px 16px;
                font-size: 0.9em;
                min-width: 80px;
            }

            .instruction-box {
                padding: 12px;
                font-size: 0.85em;
            }

            .game-board {
                gap: 15px;
            }

            .tower-wrapper {
                max-width: 100%;
            }

            .tower-label {
                font-size: 0.9em;
            }

            .disk-stack {
                height: 180px;
                min-height: 180px;
                padding-bottom: 8px;
            }

            .pole {
                height: 170px;
                width: 6px;
            }

            .disk {
                height: 26px;
                font-size: 0.8em;
                margin: 2px 0;
                padding: 8px;
            }

            .rules-section {
                padding: 15px;
                margin-top: 20px;
            }

            .rules-section li {
                font-size: 0.9em;
            }

            .modal-container {
                padding: 25px 20px;
                width: 95%;
            }

            .modal-icon {
                font-size: 3.5em;
            }

            .modal-title {
                font-size: 1.5em;
            }

            .modal-btn {
                padding: 10px 22px;
                font-size: 0.9em;
                min-width: 85px;
                margin: 0 5px;
            }
        }

        /* е°ҸеұҸжүӢжңәдјҳеҢ– */
        @media (max-width: 320px) {
            .disk-stack {
                height: 150px;
                min-height: 150px;
            }

            .pole {
                height: 140px;
            }

            .disk {
                height: 22px;
                font-size: 0.7em;
            }

            .modal-icon {
                font-size: 3em;
            }

            .modal-title {
                font-size: 1.3em;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>рҹҺ® жұүиҜәеЎ”жёёжҲ?/h1>
        
        <div class="stats-panel">
            <div class="stat-box">
                <div class="stat-label">еҪ“еүҚжӯҘж•°</div>
                <div class="stat-number" id="steps">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">жңҖдјҳжӯҘж•?/div>
                <div class="stat-number" id="optimal">7</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">еңҶзӣҳж•°йҮҸ</div>
                <div class="stat-number" id="diskCount">3</div>
            </div>
        </div>

        <div class="control-panel">
            <select id="diskSelect" onchange="onDiskCountChange()">
                <option value="1">1 дёӘеңҶзӣ?/option>
                <option value="2">2 дёӘеңҶзӣ?/option>
                <option value="3">3 дёӘеңҶзӣ?/option>
                <option value="4">4 дёӘеңҶзӣ?/option>
                <option value="5">5 дёӘеңҶзӣ?/option>
                <option value="6">6 дёӘеңҶзӣ?/option>
                <option value="7">7 дёӘеңҶзӣ?/option>
                <option value="8">8 дёӘеңҶзӣ?/option>
            </select>
            <button class="btn-reset" onclick="startNewGame()">рҹ”„ йҮҚж–°ејҖе§?/button>
            <button class="btn-undo" onclick="undoMove()" id="undoBtn" disabled>вҶ©пёҸ ж’Өй”Җ</button>
            <button class="btn-auto" onclick="autoSolve()">рҹҺҜ иҮӘеҠЁжұӮи§Ј</button>
        </div>

        <div class="game-area">
            <div class="instruction-box" id="instruction">
                рҹ–ұпё?жӢ–еҠЁжңҖдёҠеұӮзҡ„еңҶзӣҳеҲ°зӣ®ж ҮжҹұеӯҗдёҠеҚіеҸҜз§»еҠ?            </div>

            <div class="game-board">
                <div class="tower-wrapper">
                    <div class="tower-label">жҹұеӯҗ A</div>
                    <div class="disk-stack" id="tower-A" 
                         ondragover="handleDragOver(event)" 
                         ondragleave="handleDragLeave(event)" 
                         ondrop="handleDrop(event, 'A')"
                         ontouchstart="handleTouchStart(event, 'A')"
                         ontouchend="handleTouchEnd(event, 'A')">
                        <div class="pole"></div>
                        <div class="disk-container" id="disks-A"></div>
                    </div>
                </div>

                <div class="tower-wrapper">
                    <div class="tower-label">жҹұеӯҗ B</div>
                    <div class="disk-stack" id="tower-B" 
                         ondragover="handleDragOver(event)" 
                         ondragleave="handleDragLeave(event)" 
                         ondrop="handleDrop(event, 'B')"
                         ontouchstart="handleTouchStart(event, 'B')"
                         ontouchend="handleTouchEnd(event, 'B')">
                        <div class="pole"></div>
                        <div class="disk-container" id="disks-B"></div>
                    </div>
                </div>

                <div class="tower-wrapper">
                    <div class="tower-label">жҹұеӯҗ C</div>
                    <div class="disk-stack" id="tower-C" 
                         ondragover="handleDragOver(event)" 
                         ondragleave="handleDragLeave(event)" 
                         ondrop="handleDrop(event, 'C')"
                         ontouchstart="handleTouchStart(event, 'C')"
                         ontouchend="handleTouchEnd(event, 'C')">
                        <div class="pole"></div>
                        <div class="disk-container" id="disks-C"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="rules-section">
            <h3>рҹ“ң жёёжҲҸи§„еҲҷ</h3>
            <ul>
                <li>зӣ®ж Үпјҡе°ҶжүҖжңүеңҶзӣҳд»Һ A жҹұз§»еҠЁеҲ° C жҹ?/li>
                <li>жҜҸж¬ЎеҸӘиғҪз§»еҠЁдёҖдёӘеңҶзӣ?/li>
                <li>еӨ§еңҶзӣҳдёҚиғҪж”ҫеңЁе°ҸеңҶзӣҳдёҠйқў</li>
                <li>ж“ҚдҪңж–№жі•пјҡжӢ–еҠЁжңҖдёҠеұӮзҡ„еңҶзӣҳеҲ°зӣ®ж ҮжҹұеӯҗеҚіеҸҜ</li>
            </ul>
            <p class="note">рҹ’Ў жҸҗзӨәпјҡжң¬жёёжҲҸд»…ж”ҜжҢ?1-8 дёӘеңҶзӣҳпјҢжӣҙеӨҡж•°йҮҸжҡӮдёҚж”ҜжҢҒгҖ?/p>
        </div>
    </div>

    <!-- ж¶ҲжҒҜжҸҗзӨәжЎ?-->
    <div class="message-box" id="messageBox"></div>

    <!-- еј№еҮәејҸе®ҢжҲҗз•Ңйқ?-->
    <div class="modal-overlay" id="winModal">
        <div class="modal-container">
            <div class="modal-icon" id="modalIcon">рҹҺү</div>
            <div class="modal-title" id="modalTitle">жҒӯе–ңе®ҢжҲҗпј?/div>
            <div class="modal-subtitle" id="modalSubtitle">дҪ жҲҗеҠҹе®ҢжҲҗдәҶжұүиҜәеЎ”жҢ‘жҲ?/div>
            <div class="modal-badge" id="modalBadge">е®ҢжҲҗжҢ‘жҲҳ</div>
            <div class="modal-stats">
                <div class="modal-stat">
                    <div class="modal-stat-value" id="modalSteps">0</div>
                    <div class="modal-stat-label">дҪҝз”ЁжӯҘж•°</div>
                </div>
                <div class="modal-stat">
                    <div class="modal-stat-value" id="modalOptimal">0</div>
                    <div class="modal-stat-label">жңҖдјҳжӯҘж•?/div>
                </div>
            </div>
            <button class="modal-btn modal-btn-primary" onclick="closeWinModal(); startNewGame();">рҹ”„ еҶҚзҺ©дёҖж¬?/button>
            <button class="modal-btn modal-btn-secondary" onclick="closeWinModal();">вң?е…ій—ӯ</button>
        </div>
    </div>

    <script>
        let towers = { A: [], B: [], C: [] };
        let steps = 0;
        let diskCount = 3;
        let isAutoSolving = false;
        let draggedDisk = null;
        let sourceTower = null;
        let moveHistory = [];
        let selectedTower = null; // и§Ұж‘ёжЁЎејҸдёӢйҖүдёӯзҡ„жҹұеӯ?
        const colors = [
            'linear-gradient(135deg, #FF6B6B 0%, #ee5a5a 100%)',
            'linear-gradient(135deg, #4ECDC4 0%, #3dbdb5 100%)',
            'linear-gradient(135deg, #45B7D1 0%, #34a7c1 100%)',
            'linear-gradient(135deg, #FFA07A 0%, #ee9170 100%)',
            'linear-gradient(135deg, #98D8C8 0%, #88c8b8 100%)',
            'linear-gradient(135deg, #F7DC6F 0%, #e7cc5f 100%)',
            'linear-gradient(135deg, #BB8FCE 0%, #ab7fbe 100%)'
        ];

        function startNewGame() {
            if (isAutoSolving) {
                showMessage('иҮӘеҠЁжұӮи§ЈдёӯпјҢж— жі•йҮҚж–°ејҖе§?, 'error');
                return;
            }

            diskCount = parseInt(document.getElementById('diskSelect').value);
            towers = { A: [], B: [], C: [] };
            steps = 0;
            moveHistory = [];
            selectedTower = null;

            for (let i = diskCount; i >= 1; i--) {
                towers.A.push(i);
            }

            updateUI();
            updateUndoButton();
            showMessage('жёёжҲҸејҖе§ӢпјҒжӢ–еҠЁеңҶзӣҳејҖе§ӢжёёжҲҸпјҒ', 'info');
        }

        function onDiskCountChange() {
            if (isAutoSolving) {
                showMessage('иҮӘеҠЁжұӮи§ЈдёӯпјҢж— жі•жӣҙж”№еңҶзӣҳж•°йҮҸ', 'error');
                document.getElementById('diskSelect').value = diskCount;
                return;
            }

            diskCount = parseInt(document.getElementById('diskSelect').value);
            towers = { A: [], B: [], C: [] };
            steps = 0;
            moveHistory = [];
            selectedTower = null;

            for (let i = diskCount; i >= 1; i--) {
                towers.A.push(i);
            }

            updateUI();
            updateUndoButton();
            showMessage(`е·ІеҲҮжҚўдёә ${diskCount} дёӘеңҶзӣҳпјҢжёёжҲҸйҮҚж–°ејҖе§ӢпјҒ`, 'info');
        }

        function undoMove() {
            if (moveHistory.length === 0 || isAutoSolving) {
                return;
            }

            const lastMove = moveHistory.pop();
            const { from, to, disk } = lastMove;

            towers[to].pop();
            towers[from].push(disk);
            steps--;

            updateUI();
            updateUndoButton();
            showMessage(`е·Іж’Өй”Җпјҡе°ҶеңҶзӣҳ ${disk} д»?${to} з§»еӣһ ${from}`, 'info');
        }

        function updateUndoButton() {
            const undoBtn = document.getElementById('undoBtn');
            undoBtn.disabled = moveHistory.length === 0 || isAutoSolving;
        }

        function updateUI() {
            for (let towerId of ['A', 'B', 'C']) {
                const container = document.getElementById(`disks-${towerId}`);
                container.innerHTML = '';

                towers[towerId].forEach((diskSize, index) => {
                    const disk = document.createElement('div');
                    disk.className = 'disk';
                    disk.textContent = diskSize;
                    disk.style.background = colors[(diskSize - 1) % colors.length];
                    
                    const maxWidth = Math.min(180, window.innerWidth > 480 ? 180 : 140);
                    const minWidth = Math.min(60, window.innerWidth > 480 ? 60 : 40);
                    const width = minWidth + (maxWidth - minWidth) * (diskSize / diskCount);
                    disk.style.width = `${width}px`;

                    // ж Үи®°йқһйЎ¶еұӮеңҶзӣ?                    if (index !== towers[towerId].length - 1) {
                        disk.classList.add('not-top');
                    }

                    disk.draggable = index === towers[towerId].length - 1 && !isAutoSolving;
                    disk.ondragstart = (e) => handleDragStart(e, towerId);
                    disk.ondragend = handleDragEnd;
                    
                    // и§Ұж‘ёдәӢд»¶
                    disk.ontouchstart = (e) => handleDiskTouchStart(e, towerId);
                    
                    container.appendChild(disk);
                });
            }

            document.getElementById('steps').textContent = steps;
            document.getElementById('optimal').textContent = Math.pow(2, diskCount) - 1;
            document.getElementById('diskCount').textContent = diskCount;

            // жӣҙж–°йҖүдёӯзҠ¶жҖ?            updateSelectedTower();
        }

        function updateSelectedTower() {
            document.querySelectorAll('.disk-stack').forEach(stack => {
                stack.classList.remove('selected');
            });
            if (selectedTower) {
                document.getElementById(`tower-${selectedTower}`).classList.add('selected');
            }
        }

        function showMessage(message, type) {
            const box = document.getElementById('messageBox');
            box.textContent = message;
            box.className = `message-box ${type} show`;

            setTimeout(() => {
                box.classList.remove('show');
            }, 2500);
        }

        function handleDragStart(event, towerId) {
            const topDisk = towers[towerId][towers[towerId].length - 1];
            if (event.target.textContent.trim() !== String(topDisk)) {
                event.preventDefault();
                showMessage('еҸӘиғҪз§»еҠЁжңҖдёҠеұӮзҡ„еңҶзӣҳпјҒ', 'error');
                return;
            }

            draggedDisk = event.target;
            sourceTower = towerId;
            
            event.target.classList.add('dragging');
            event.dataTransfer.effectAllowed = 'move';
            
            setTimeout(() => {
                event.target.style.opacity = '0.4';
            }, 0);
        }

        function handleDragEnd(event) {
            event.target.classList.remove('dragging');
            event.target.style.opacity = '1';
            draggedDisk = null;
            sourceTower = null;
            
            document.querySelectorAll('.disk-stack').forEach(stack => {
                stack.classList.remove('drag-over');
            });
        }

        function handleDragOver(event) {
            event.preventDefault();
            event.dataTransfer.dropEffect = 'move';
            event.currentTarget.classList.add('drag-over');
        }

        function handleDragLeave(event) {
            event.currentTarget.classList.remove('drag-over');
        }

        function handleDrop(event, targetTower) {
            event.preventDefault();
            event.currentTarget.classList.remove('drag-over');

            if (!sourceTower || !draggedDisk) return;
            if (sourceTower === targetTower) {
                showMessage('еңҶзӣҳе·Із»ҸеңЁиҜҘжҹұеӯҗдёҠпјҒ', 'info');
                return;
            }

            moveDisk(sourceTower, targetTower);
        }

        // и§Ұж‘ёдәӢд»¶еӨ„зҗҶ - зӮ№еҮ»жҹұеӯҗйҖүжӢ©/з§»еҠЁ
        function handleTouchStart(event, towerId) {
            event.preventDefault();
            
            if (isAutoSolving) return;

            // еҰӮжһңе·Із»ҸйҖүдёӯдәҶдёҖдёӘжҹұеӯ?            if (selectedTower) {
                // еҰӮжһңзӮ№еҮ»зҡ„жҳҜеҗҢдёҖдёӘжҹұеӯҗпјҢеҸ–ж¶ҲйҖүжӢ©
                if (selectedTower === towerId) {
                    selectedTower = null;
                    updateSelectedTower();
                    showMessage('е·ІеҸ–ж¶ҲйҖүжӢ©', 'info');
                    return;
                }

                // е°қиҜ•д»ҺйҖүдёӯзҡ„жҹұеӯҗз§»еҠЁеҲ°еҪ“еүҚжҹұеӯҗ
                if (towers[selectedTower].length > 0) {
                    moveDisk(selectedTower, towerId);
                } else {
                    showMessage('иҜҘжҹұеӯҗжІЎжңүеңҶзӣҳеҸҜз§»еҠЁпј?, 'error');
                }
                selectedTower = null;
                updateSelectedTower();
            } else {
                // йҖүжӢ©ж–°зҡ„жҹұеӯҗ
                if (towers[towerId].length > 0) {
                    selectedTower = towerId;
                    updateSelectedTower();
                    showMessage(`е·ІйҖүжӢ©жҹұеӯҗ ${towerId}пјҢзӮ№еҮ»зӣ®ж Үжҹұеӯҗз§»еҠЁ`, 'info');
                } else {
                    showMessage('иҜҘжҹұеӯҗжІЎжңүеңҶзӣҳпјҒ', 'info');
                }
            }
        }

        // и§Ұж‘ёз»“жқҹеӨ„зҗҶ
        function handleTouchEnd(event, towerId) {
            // и§Ұж‘ёз»“жқҹж—¶зҡ„йўқеӨ–еӨ„зҗҶпјҲеҰӮжһңйңҖиҰҒпјү
        }

        // еңҶзӣҳи§Ұж‘ёејҖе§ӢеӨ„зҗ?        function handleDiskTouchStart(event, towerId) {
            event.preventDefault();
            
            if (isAutoSolving) return;

            const diskElement = event.target;
            const diskSize = parseInt(diskElement.textContent);
            const topDisk = towers[towerId][towers[towerId].length - 1];

            // еҸӘиғҪз§»еҠЁйЎ¶еұӮеңҶзӣҳ
            if (diskSize !== topDisk) {
                showMessage('еҸӘиғҪз§»еҠЁжңҖдёҠеұӮзҡ„еңҶзӣҳпјҒ', 'error');
                return;
            }

            // еҰӮжһңе·Із»ҸйҖүдёӯдәҶе…¶д»–жҹұеӯҗпјҢзӣҙжҺҘз§»еҠЁ
            if (selectedTower && selectedTower !== towerId) {
                moveDisk(selectedTower, towerId);
                selectedTower = null;
                updateSelectedTower();
            } else {
                // йҖүжӢ©еҪ“еүҚжҹұеӯҗ
                selectedTower = towerId;
                updateSelectedTower();
                showMessage(`е·ІйҖүжӢ©жҹұеӯҗ ${towerId}пјҢзӮ№еҮ»зӣ®ж Үжҹұеӯҗз§»еҠЁ`, 'info');
            }
        }

        function moveDisk(from, to) {
            const sourceTower = towers[from];
            const targetTower = towers[to];

            const diskToMove = sourceTower[sourceTower.length - 1];
            const targetTopDisk = targetTower.length > 0 ? targetTower[targetTower.length - 1] : 0;

            if (targetTower.length > 0 && diskToMove > targetTopDisk) {
                showMessage(`вқ?й”ҷиҜҜпјҡеңҶзӣ?${diskToMove} жҜ?${targetTopDisk} еӨ§пјҢдёҚиғҪж”ҫеңЁдёҠйқўпјҒ`, 'error');
                return;
            }

            sourceTower.pop();
            targetTower.push(diskToMove);
            steps++;

            moveHistory.push({ from, to, disk: diskToMove });
            updateUndoButton();

            updateUI();
            showMessage(`вң?е°ҶеңҶзӣ?${diskToMove} д»?${from} з§»еҠЁеҲ?${to}пјҲз¬¬ ${steps} жӯҘпјү`, 'info');

            if (towers.C.length === diskCount) {
                setTimeout(() => {
                    showWinModal(steps === Math.pow(2, diskCount) - 1);
                }, 300);
            }
        }

        async function autoSolve() {
            if (isAutoSolving) {
                showMessage('е·Із»ҸеңЁиҮӘеҠЁжұӮи§Јдёӯ...', 'error');
                return;
            }

            diskCount = parseInt(document.getElementById('diskSelect').value);
            startNewGame();
            isAutoSolving = true;
            moveHistory = [];
            updateUndoButton();
            
            showMessage('рҹҺҜ ејҖе§ӢиҮӘеҠЁжұӮи§Јжј”зӨ?..', 'info');

            await solveHanoi(diskCount, 'A', 'B', 'C');

            isAutoSolving = false;
            updateUndoButton();
            showMessage(`вң?иҮӘеҠЁжұӮи§Је®ҢжҲҗпјҒе…ұз”?${steps} жӯҘ`, 'success');
        }

        async function solveHanoi(n, source, auxiliary, target) {
            if (n === 1) {
                moveDisk(source, target);
                await delay(300);
                return;
            }

            await solveHanoi(n - 1, source, target, auxiliary);
            moveDisk(source, target);
            await delay(300);
            await solveHanoi(n - 1, auxiliary, source, target);
        }

        function delay(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        function showWinModal(isOptimal) {
            const modal = document.getElementById('winModal');
            const icon = document.getElementById('modalIcon');
            const title = document.getElementById('modalTitle');
            const subtitle = document.getElementById('modalSubtitle');
            const badge = document.getElementById('modalBadge');
            const stepsEl = document.getElementById('modalSteps');
            const optimalEl = document.getElementById('modalOptimal');

            if (isOptimal) {
                icon.textContent = 'рҹҸҶ';
                title.textContent = 'е®ҢзҫҺйҖҡе…іпј?;
                subtitle.textContent = 'дҪ з”ЁжңҖдјҳжӯҘж•°е®ҢжҲҗдәҶжҢ‘жҲҳпј?;
                badge.textContent = 'рҹҸ… жңҖдјҳи§Ј';
                badge.className = 'modal-badge optimal';
            } else {
                icon.textContent = 'рҹҺү';
                title.textContent = 'жҒӯе–ңе®ҢжҲҗпј?;
                subtitle.textContent = 'дҪ жҲҗеҠҹе®ҢжҲҗдәҶжұүиҜәеЎ”жҢ‘жҲ?;
                badge.textContent = 'рҹҺҜ е®ҢжҲҗжҢ‘жҲҳ';
                badge.className = 'modal-badge not-optimal';
            }

            stepsEl.textContent = steps;
            optimalEl.textContent = Math.pow(2, diskCount) - 1;

            modal.classList.add('show');
        }

        function closeWinModal() {
            const modal = document.getElementById('winModal');
            modal.classList.remove('show');
        }

        // еҲқе§ӢеҢ?        startNewGame();

        // йҳ»жӯўйЎөйқўзј©ж”ҫпјҲз§»еҠЁз«Ҝпј?        document.addEventListener('touchstart', function(event) {
            if (event.touches.length > 1) {
                event.preventDefault();
            }
        }, { passive: false });

        let lastTouchEnd = 0;
        document.addEventListener('touchend', function(event) {
            const now = (new Date()).getTime();
            if (now - lastTouchEnd <= 300) {
                event.preventDefault();
            }
            lastTouchEnd = now;
        }, false);
    </script>
</body>
</html>
